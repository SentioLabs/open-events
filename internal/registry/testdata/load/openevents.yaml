openevents: 0.1.0
namespace: com.example.product

package:
  go: github.com/example/product/events
  python: example_product.events

defaults:
  queue: product-events
  snowflake:
    database: ANALYTICS
    schema: EVENTS

owners:
  - team: data-platform
    email: data-platform@example.com
  - team: growth
    slack: "#team-growth"
    email: growth-data@example.com

context:
  tenant_id:
    type: string
    required: true
    pii: none
    description: Stable tenant identifier.
  user_id:
    type: string
    required: false
    pii: pseudonymous
    description: Stable internal user identifier.
  platform:
    type: enum
    values: [ios, android, web, backend]
    required: true
    pii: none

events:
  user.signed_up:
    version: 1
    status: active
    description: User completed account signup.
    owner: growth
    producer: api
    sources: [ios, android, web]
    destination:
      queue: product-events
      snowflake_table: fact_user_signed_up
    properties:
      signup_method:
        type: enum
        values: [email, google, apple]
        required: true
        pii: none
      plan:
        type: string
        required: false
        pii: none

  search.query_submitted:
    version: 1
    status: active
    description: User submitted a search query.
    owner: data-platform
    producer: api
    sources: [ios, android, web]
    destination:
      queue: product-events
      snowflake_table: fact_search_query_submitted
    properties:
      query_text:
        type: string
        required: true
        pii: personal
        description: Raw user query text.
      result_count:
        type: integer
        required: true
        pii: none
      latency_ms:
        type: integer
        required: false
        pii: none
