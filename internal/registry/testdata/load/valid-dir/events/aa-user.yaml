events:
  user.signed_up:
    version: 1
    status: active
    description: User completed account signup.
    owner: growth
    producer: api
    sources: [ios, android, web]
    destination:
      queue: product-events
      snowflake_table: fact_user_signed_up
    properties:
      signup_method:
        type: enum
        values: [email, google, apple]
        required: true
        pii: none
      plan:
        type: string
        required: false
        pii: none
