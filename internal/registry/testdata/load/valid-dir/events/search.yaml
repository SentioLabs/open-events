openevents: 0.1.0
namespace: com.example.product

package:
  go: github.com/example/product/events
  python: example_product.events

defaults:
  queue: product-events
  snowflake:
    database: ANALYTICS
    schema: EVENTS

events:
  search.query_submitted:
    version: 1
    status: active
    description: User submitted a search query.
    owner: data-platform
    producer: api
    sources: [ios, android, web]
    destination:
      queue: product-events
      snowflake_table: fact_search_query_submitted
    properties:
      query_text:
        type: string
        required: true
        pii: personal
        description: Raw user query text.
      result_count:
        type: integer
        required: true
        pii: none
      latency_ms:
        type: integer
        required: false
        pii: none
