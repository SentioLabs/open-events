version: 1
status: active
description: "Per-thread RTOS stack usage snapshot from the device."
producer: z9-firmware
sources: [backend]
properties:
  - name: thread_count
    type: integer
    required: true
    pii: none
  - name: highest_usage_percent
    type: integer
    required: true
    pii: none
  - name: highest_usage_thread
    type: string
    required: true
    pii: none
  - name: threads
    type: array
    required: true
    pii: none
    items:
      type: object
      pii: none
      properties:
        name:
          type: string
          required: true
          pii: none
        stack_size_bytes:
          type: integer
          required: true
          pii: none
        stack_used_bytes:
          type: integer
          required: true
          pii: none
        usage_percent:
          type: integer
          required: true
          pii: none
        priority:
          type: integer
          required: true
          pii: none
        state:
          type: enum
          values: [running, ready, pending, suspended, dead]
          required: true
          pii: none
