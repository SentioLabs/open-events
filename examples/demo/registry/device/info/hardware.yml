version: 1
status: active
description: "Hardware configuration read from device EEPROM at startup."
producer: z9-firmware
sources: [backend]
properties:
  - name: unique_id
    type: string
    required: true
    pii: pseudonymous
  - name: manufacturing_timestamp
    type: timestamp
    required: true
    pii: none
  - name: eeprom_format_version
    type: object
    required: true
    pii: none
    properties:
      major:
        type: integer
        required: true
        pii: none
      minor:
        type: integer
        required: true
        pii: none
  - name: module_pcb_version
    type: object
    required: true
    pii: none
    properties:
      major:
        type: integer
        required: true
        pii: none
      minor:
        type: integer
        required: true
        pii: none
  - name: sensor_type
    type: enum
    values: [unspecified, co, alcohol, oxygen, fuel_cell]
    required: true
    pii: none
  - name: fuel_cell_lot_number
    type: string
    required: false
    pii: none
  - name: fuel_cell_vendor
    type: string
    required: false
    pii: none
