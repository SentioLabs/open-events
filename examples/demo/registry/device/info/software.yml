version: 1
status: active
description: "Software version information reported by the device at startup."
producer: z9-firmware
sources: [backend]
properties:
  - name: serial_number
    type: string
    required: true
    pii: none
  - name: unique_id
    type: integer
    required: true
    pii: none
  - name: product_type
    type: string
    required: true
    pii: none
  - name: pcba_hw_version
    type: string
    required: true
    pii: none
  - name: pcba_hw_manufactured_timestamp_ms
    type: integer
    required: true
    pii: none
  - name: versions
    type: object
    required: true
    pii: none
    properties:
      zephyr_kernel_version:
        type: string
        required: true
        pii: none
      zephyr_kernel_git_sha:
        type: string
        required: true
        pii: none
      app_semantic_version:
        type: string
        required: true
        pii: none
      app_git_sha:
        type: string
        required: true
        pii: none
      compile_time:
        type: string
        required: true
        pii: none
      compiled_on_os:
        type: string
        required: true
        pii: none
      compiled_by:
        type: string
        required: true
        pii: none
      compiler_version:
        type: string
        required: true
        pii: none
      hw_platform:
        type: string
        required: true
        pii: none
      build_type:
        type: string
        required: true
        pii: none
      bootloader_git_sha:
        type: string
        required: true
        pii: none
      bootloader_build_timestamp:
        type: integer
        required: true
        pii: none
