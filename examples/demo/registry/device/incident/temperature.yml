version: 1
status: active
description: "Device temperature exceeded a configured threshold."
producer: z9-firmware
sources: [backend]
properties:
  - name: degrees_c
    type: number
    required: true
    pii: none
  - name: threshold_c
    type: number
    required: true
    pii: none
  - name: breach_type
    type: enum
    values: [over, under]
    required: true
    pii: none
